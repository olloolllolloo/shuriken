<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Основной контент */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .content h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .content p {
            font-size: 14px;
            color: #8e8e93;
        }

        /* Нижняя навигация */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 60px;
            background-color: #1c1c1e;
            border-top: 1px solid #2c2c2e;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            height: 100%;
            color: #8e8e93;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .nav-item.active {
            color: #ffffff;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            fill: currentColor;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 500;
        }

        /* Скрытие вкладок */
        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }
    </style>
</head>
<body>

    <!-- Вкладка: Играть -->
    <div id="tab-play" class="content tab-content active">
        <h1>🎮 Играть</h1>
        <p>Здесь будет игра</p>
    </div>

    <!-- Вкладка: Баланс -->
    <div id="tab-balance" class="content tab-content">
        <h1>💰 Баланс</h1>
        <p>0.00 монет</p>
    </div>

    <!-- Нижняя навигация -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('play', this)">
            <svg viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z"/>
            </svg>
            <span>Играть</span>
        </div>
        <div class="nav-item" onclick="switchTab('balance', this)">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.39-2.1 1.39-1.6 0-2.23-.72-2.32-1.64H8.04c.1 1.7 1.36 2.66 2.86 2.97V19h2.19v-1.71c1.52-.29 2.72-1.16 2.72-2.77 0-2.03-1.66-2.79-3.5-3.22z"/>
            </svg>
            <span>Баланс</span>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Настройка цветов под тему Telegram (в оттенках серого)
        if (tg.themeParams) {
            document.body.style.backgroundColor = tg.themeParams.bg_color || '#000000';
            document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#ffffff');
        }

        // Функция переключения вкладок
        function switchTab(tabName, element) {
            // Скрываем все вкладки
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Убираем активный класс у всех кнопок
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            // Показываем нужную вкладку
            document.getElementById('tab-' + tabName).classList.add('active');
            
            // Подсвечиваем нажатую кнопку
            element.classList.add('active');

            // Вибрация при переключении
            if (tg.HapticFeedback) {
                tg.HapticFeedback.selectionChanged();
            }
        }
    </script>
</body>
</html>
