<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Основной контент */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .content.active {
            opacity: 1;
            transform: scale(1);
        }

        .content h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .content p {
            font-size: 15px;
            color: #6e6e73;
        }

        /* Нижняя навигация с эффектом стекла */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 70px;
            background: rgba(28, 28, 30, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: env(safe-area-inset-bottom);
            position: relative;
        }

        /* Блик сверху для эффекта стекла */
        .bottom-nav::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            height: 100%;
            color: #6e6e73;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            position: relative;
        }

        .nav-item.active {
            color: #ffffff;
        }

        /* Квадратные иконки с закругленными краями (squircle) */
        .icon-box {
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            margin-bottom: 6px;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item.active .icon-box {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .nav-item:active .icon-box {
            transform: scale(0.95);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .nav-item span {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* Анимация пульсации для активной кнопки */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.1); }
            70% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        .nav-item.active .icon-box {
            animation: pulse 2s infinite;
        }

        /* Скрытие вкладок */
        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }
    </style>
</head>
<body>

    <!-- Вкладка: Играть -->
    <div id="tab-play" class="content tab-content active">
        <h1>🎮 Играть</h1>
        <p>Нажми кнопку ниже чтобы начать</p>
    </div>

    <!-- Вкладка: Баланс -->
    <div id="tab-balance" class="content tab-content">
        <h1>💰 Баланс</h1>
        <p>0.00 монет</p>
    </div>

    <!-- Нижняя навигация -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('play', this)">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </div>
            <span>Играть</span>
        </div>
        <div class="nav-item" onclick="switchTab('balance', this)">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.39-2.1 1.39-1.6 0-2.23-.72-2.32-1.64H8.04c.1 1.7 1.36 2.66 2.86 2.97V19h2.19v-1.71c1.52-.29 2.72-1.16 2.72-2.77 0-2.03-1.66-2.79-3.5-3.22z"/>
                </svg>
            </div>
            <span>Баланс</span>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Настройка цветов под тему Telegram
        if (tg.themeParams) {
            document.body.style.background = tg.themeParams.bg_color || 'linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%)';
        }

        // Функция переключения вкладок с анимацией
        function switchTab(tabName, element) {
            // Скрываем все вкладки с анимацией
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
                setTimeout(() => {
                    if (!tab.classList.contains('active')) {
                        tab.style.opacity = '0';
                        tab.style.transform = 'scale(0.95)';
                    }
                }, 100);
            });
            
            // Убираем активный класс у всех кнопок
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            // Показываем нужную вкладку с анимацией
            const activeTab = document.getElementById('tab-' + tabName);
            activeTab.classList.add('active');
            setTimeout(() => {
                activeTab.style.opacity = '1';
                activeTab.style.transform = 'scale(1)';
            }, 50);
            
            // Подсвечиваем нажатую кнопку
            element.classList.add('active');

            // Вибрация при переключении
            if (tg.HapticFeedback) {
                tg.HapticFeedback.selectionChanged();
            }
        }
    </script>
</body>
</html>
